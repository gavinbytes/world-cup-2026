# nginx: serve the World Cup globe at https://gavinbytes.tech/worldcup
#
# Paste these two blocks INSIDE the existing `server { ... }` for gavinbytes.tech
# (the one that already has your TLS / Let's Encrypt config), then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# How it works: `proxy_pass .../` strips the /worldcup/ prefix, so serve.py sees
# plain root paths (/, /js/main.js, /api/feed) and stays mount-point agnostic.
# The app's asset URLs are page-relative, so they resolve back under /worldcup/.

# Send the bare path to the trailing-slash form so relative asset URLs resolve.
location = /worldcup {
    return 301 /worldcup/;
}

location /worldcup/ {
    proxy_pass http://127.0.0.1:8642/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Defence-in-depth headers (the real XSS fix is the output escaping in JS).
    add_header X-Content-Type-Options nosniff       always;
    add_header X-Frame-Options        SAMEORIGIN    always;
    add_header Referrer-Policy        no-referrer-when-downgrade always;
}
